name: DB Safety

# Runs on every pull request. Scans the SQL files THIS PR changes
# (compared to the base branch) for destructive statements that could
# erase data or schema, and fails the check if any are found.
on:
  pull_request:

jobs:
  migration-check:
    name: Migration safety
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, so we can diff against the base branch

      - name: Scan changed SQL files for destructive statements
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          echo "Comparing against base commit: $BASE_SHA"

          # Which .sql files did this PR change?
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- '*.sql')
          if [ -z "$CHANGED" ]; then
            echo "No SQL files changed in this PR — nothing to check."
            exit 0
          fi
          echo "Changed SQL files:"
          echo "$CHANGED"

          # Statements that can destroy data or schema (case-insensitive).
          PATTERN='DROP[[:space:]]+(TABLE|COLUMN|DATABASE|SCHEMA)|TRUNCATE|DELETE[[:space:]]+FROM|ALTER[[:space:]]+TABLE.*DROP'

          FOUND=0
          for f in $CHANGED; do
            [ -f "$f" ] || continue   # skip files deleted in this PR
            MATCHES=$(grep -inE "$PATTERN" "$f" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error file=$f::Destructive SQL detected"
              echo "  $f:"
              echo "$MATCHES" | sed 's/^/    /'
              FOUND=1
            fi
          done

          if [ "$FOUND" -ne 0 ]; then
            echo ""
            echo "Destructive database statements were found in changed SQL files."
            echo "These can erase data or schema. If it is genuinely intended, a"
            echo "maintainer must review and approve it deliberately (e.g. via an"
            echo "'allow-destructive' label or a CODEOWNERS sign-off)."
            exit 1
          fi

          echo "No destructive statements in changed SQL. Safe to merge."
