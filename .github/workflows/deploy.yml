name: Deploy to GitHub Pages

# WHEN: every time main changes (i.e. after a PR is merged)
on:
  push:
    branches: [main]

# Permissions this workflow needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; newest wins
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}   # the live URL, shown in the UI
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Package the site for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # publish the repo root (index.html lives here)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
