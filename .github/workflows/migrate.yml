name: Migrate

# After anything merges to main, apply any pending database migrations.
# This is the "schema changes ship automatically on deploy" pattern.
on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply DB migrations
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run pending migrations
        run: npm run migrate up
        env:
          # The connection string comes from a GitHub Actions SECRET,
          # never from the code. node-pg-migrate reads DATABASE_URL by default.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
