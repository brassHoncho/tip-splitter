# Dependabot keeps dependencies current and patched.
# It opens small PRs (which run through your normal CI) when a dependency
# has a newer or security-fixed version.
version: 2
updates:
  # Your npm packages (e.g. @neondatabase/serverless, node-pg-migrate).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # The versions of the GitHub Actions you use (actions/checkout, etc.).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
