name: CI

# WHEN this workflow runs:
on:
  pull_request:            # on every pull request...
  push:
    branches: [main]       # ...and on every push to main (e.g. after a merge)

jobs:
  lint-html:
    name: Lint HTML
    runs-on: ubuntu-latest   # GitHub spins up a fresh Ubuntu virtual machine

    steps:
      - name: Check out the code
        uses: actions/checkout@v4      # copies your repo onto the runner

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Lint index.html with HTMLHint
        run: npx --yes htmlhint index.html

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run the unit tests with a coverage gate
        # Fails if coverage of the tested code drops below 80%.
        run: >
          node --test --experimental-test-coverage
          --test-coverage-lines=80
          --test-coverage-functions=80
          --test-coverage-branches=80

  format:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check formatting with Prettier
        run: npx --yes prettier@3.3.3 --check .
